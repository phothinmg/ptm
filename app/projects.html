---
layout: default
title: Projects
---

<h1 id="projects">Projects</h1>

{% for project in site.projects %}
<div class="box">
  <a href="{{ project.url}}" class="project-title">{{ project.title }}</a>

  <div class="badge">
    <a
      href="{{ project.github }}"
      aria-label="dependensia-github"
      target="_blank"
      rel="noopener"
    >
      <img
        alt="Static Badge"
        src="https://img.shields.io/badge/github-repo-blue?style=flat&logo=github"
        width="97"
        height="20"
      />
    </a>
    <a
      href="{{ project.npm }}"
      aria-label="dependensia-npm"
      target="_blank"
      rel="noopener"
    >
      <img
        alt="Static Badge"
        src="https://img.shields.io/badge/npm-package-red?style=flat&logo=npm"
        width="107"
        height="20"
      />
    </a>
  </div>
  <p>{{project.description}}</p>
</div>

{% endfor %}
