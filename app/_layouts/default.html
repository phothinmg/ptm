<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
    <!-- Jekyll Plugin -->
    {% feed_meta %} {% seo %}
  </head>
  <body>
    {% include navigation.html %}
    <main>{{ content }}</main>
    <footer>
      <div class="container">
        {% assign current_year = "now" | date: "%Y" %}
        <p>&copy; {{ current_year }} {{ site.title }} All rights reserved.</p>
        <p><span>Made With</span><span>❤️</span></p>
      </div>
    </footer>
    <button type="button" class="top-btn" title="Scroll To Top" id="topbtn">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="54"
        height="54"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="icon icon-tabler icons-tabler-outline icon-tabler-circle-arrow-up"
      >
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
        <path d="M12 8l-4 4" />
        <path d="M12 8v8" />
        <path d="M16 12l-4 -4" />
      </svg>
    </button>
    <script src="/js/ptm.js"></script>
  </body>
</html>
