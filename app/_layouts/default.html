<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
    <!-- Jekyll Plugin -->
    {% feed_meta %} {% seo %}
  </head>
  <body>
    {% include navigation.html %}
    <main>{{ content }}</main>
    <footer>
      <div class="container">
        {% assign current_year = "now" | date: "%Y" %}
        <p>&copy; {{ current_year }} {{ site.title }} All rights reserved.</p>
        <p><span>Made With</span><span>❤️</span></p>
      </div>
    </footer>
    <button type="button" class="top-btn" title="Scroll To Top" id="topbtn">
      <i class="arrow-up" style="font-size: 45px"></i>
    </button>
    <script src="/js/ptm.js"></script>
  </body>
</html>
